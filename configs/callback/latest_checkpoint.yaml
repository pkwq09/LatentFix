_target_: pytorch_lightning.callbacks.ModelCheckpoint

dirpath:  ${path.working_dir}/checkpoints
filename: latest-{epoch}
monitor: step
mode: max
# Avoid duplicate saves vs last_ckpt when frequencies align with val epochs
every_n_epochs: 100000
save_top_k: -1
save_last: false
save_on_train_epoch_end: true
