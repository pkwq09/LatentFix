# Loss weights only (MLDLosses removed)
# _target_: src.model.losses.MLDLosses

lmd_rfeats_recons: 1.0
lmd_jfeats_recons: 1.0
predict_epsilon: false

modelname: ${model.modelname}

lmd_latent: 1e-5
# MLD VAE stage often uses 1e-4 vs 1e-5 here — tune as needed
lmd_kl: 1e-4
lmd_prior: 0.0
lmd_recons: 1.0
lmd_joint: 1.0
lmd_gen: 1.0
enable_gen_consistency: false

fuse: 'concat' # add | null

loss_on_both: true
loss_on_jfeats: false
ablation_no_kl_combine: false
ablation_no_kl_gaussian: false
ablation_no_motionencoder: false

