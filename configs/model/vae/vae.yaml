_target_: src.model.vae.mld_vae.MldVae

arch: 'encoder_decoder'  # all_encoder

nfeats: ${model.nfeats}

# [num_latent_tokens, dim_per_token]; 
latent_dim: [3, 256]

# Pretrained VAE checkpoint (resume training)
pretrained_ckpt: #experiments/vae_motionfix/vae/3/checkpoints/last-epoch=3999.ckpt  # customize
pretrained_state_key: 'vae'
pretrained_strict: true

ff_size: 1024
num_layers: 9
num_heads: 4
dropout: 0.1
normalize_before: false
activation: 'gelu'

position_embedding: 'learned'  # sinusoidal

mlp_dist: false
pe_type: 'mld'  # actor

# Whether to use skip connections in the VAE
skip_connect: true
