# Lightning Trainer defaults
strategy: ddp # null = single GPU; ddp for multi-GPU
benchmark: True
max_epochs: 2000   # customize
accelerator: gpu

log_every_n_steps: 100  # customize
deterministic: False
detect_anomaly: False
enable_progress_bar: True
# Validation at epochs ... if k=100 -> 99, 199, ... (Lightning convention)
check_val_every_n_epoch: 100 # if k --> (k-1), 2*(k-1), ...   customize
limit_train_batches: 1.0
limit_val_batches: 1.0
num_sanity_val_steps: 0 # 2
precision: 32 # 'bf16' | 16 | 32
